<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Verres Progressifs – Optic 2.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #1a4fdb;
    --blue-light: #e8effe;
    --gray: #f5f5f3;
    --text: #111;
    --text-muted: #777;
    --border: #e5e5e5;
    --white: #fff;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1c1c1e;
    font-family: 'DM Sans', sans-serif;
  }

  .app {
    width: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── IMAGE VIEWER ── */
  .viewer {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #1c1c1e;
    min-height: 0;
  }

  .slide {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.28s ease;
    pointer-events: none;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  .slide img {
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
  }

  .slide-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: rgba(255,255,255,0.35);
    font-size: 13px; text-align: center; padding: 20px;
  }

  .viewer::after {
    content: ''; position: absolute;
    bottom: 0; left: 0; right: 0; height: 50px;
    background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
    z-index: 2; pointer-events: none;
  }

  .dots {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    z-index: 3; display: flex; gap: 6px; align-items: center;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.45); transition: all 0.2s;
  }
  .dot.active { width: 20px; border-radius: 3px; background: #fff; }

  .swipe-hint {
    position: absolute; bottom: 13px; right: 16px; z-index: 3;
    font-size: 11px; color: rgba(255,255,255,0.4);
    display: flex; align-items: center; gap: 4px;
  }

  /* ── PANNEAU BAS ── */
  .panel {
    flex-shrink: 0;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: row;
    align-items: stretch;
  }

  /* Logo */
  .brand {
    flex-shrink: 0;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center;
    padding: 12px 16px;
    border-right: 1px solid var(--border);
    gap: 5px;
  }
  .logo-icon {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--blue-light);
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 19px; height: 19px; }
  .brand-name {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; color: var(--blue); text-transform: uppercase;
  }

  /* Slider */
  .slider-section {
    flex: 1;
    padding: 12px 18px;
    display: flex; flex-direction: column; justify-content: center;
    border-right: 1px solid var(--border);
  }
  .slider-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .slider-label {
    font-size: 13px; font-weight: 500;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
  }
  .slider-value {
    font-size: 13px; font-weight: 600; color: var(--blue);
  }

  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 5px;
    background: var(--border); border-radius: 3px;
    outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--blue); border: 3px solid white;
    box-shadow: 0 0 0 1.5px var(--blue), 0 2px 5px rgba(26,79,219,0.3);
    cursor: pointer; transition: transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.15); }
  input[type=range]::-moz-range-thumb {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--blue); border: 3px solid white;
    box-shadow: 0 0 0 1.5px var(--blue); cursor: pointer;
  }

  .slider-track { position: relative; margin-bottom: 7px; }
  .slider-fill {
    position: absolute; top: 50%; left: 0; transform: translateY(-50%);
    height: 5px; background: var(--blue); border-radius: 3px;
    pointer-events: none; transition: width 0.1s;
  }
  .slider-ticks { display: flex; justify-content: space-between; }
  .tick {
    font-size: 15px; color: var(--text-muted);
    text-align: center; flex: 1;
  }
  .tick:first-child { text-align: left; }
  .tick:last-child { text-align: right; }

  /* Cards */
  .cards {
    flex-shrink: 0;
    display: flex; flex-direction: row;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
  }
  .card {
    background: var(--gray); border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer; border: 1.5px solid transparent;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent; user-select: none;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    white-space: nowrap;
  }
  .card.active { background: var(--blue-light); border-color: var(--blue); }
  .card-num {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em; color: var(--text-muted);
  }
  .card.active .card-num { color: var(--blue); }
  .card-name {
    font-size: 16px; font-weight: 600; color: var(--text);
  }
  .card.active .card-name { color: var(--blue); }
</style>
</head>
<body>
<div class="app">

  <!-- IMAGE VIEWER -->
  <div class="viewer" id="viewer">

    <div class="slide active" id="slide-0">
      <img src="standards.jpg" alt="Verres standards" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="slide-placeholder" style="display:none">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>standards.jpg</span>
      </div>
    </div>

    <div class="slide" id="slide-1">
      <img src="optimises.jpg" alt="Verres optimisés" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="slide-placeholder" style="display:none">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>optimises.jpg</span>
      </div>
    </div>

    <div class="slide" id="slide-2">
      <img src="haute-def.jpg" alt="Verres Haute Définition" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="slide-placeholder" style="display:none">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>haute-def.jpg</span>
      </div>
    </div>

    <div class="slide" id="slide-3">
      <img src="precision.jpg" alt="Verres Précision HD" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="slide-placeholder" style="display:none">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>precision.jpg</span>
      </div>
    </div>

    <div class="dots">
      <div class="dot active" id="dot-0"></div>
      <div class="dot" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
      <div class="dot" id="dot-3"></div>
    </div>

    <div class="swipe-hint">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      Glisser
    </div>
  </div>

  <!-- PANNEAU BAS -->
  <div class="panel">

    <div class="brand">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a4fdb" stroke-width="2" stroke-linecap="round">
          <circle cx="7" cy="12" r="4"/><circle cx="17" cy="12" r="4"/>
        </svg>
      </div>
      <span class="brand-name">Optic 2.0</span>
    </div>

    <div class="slider-section">
      <div class="slider-header">
        <span class="slider-label">Niveau de qualité</span>
        <span class="slider-value" id="sliderValue">Standards</span>
      </div>
      <div class="slider-track">
        <div class="slider-fill" id="sliderFill" style="width:0%"></div>
        <input type="range" min="0" max="3" step="1" value="0" id="slider">
      </div>
      <div class="slider-ticks">
        <span class="tick">Standards</span>
        <span class="tick">Optimisés</span>
        <span class="tick">Haute Déf.</span>
        <span class="tick">Précision HD</span>
      </div>
    </div>

    <div class="cards">
      <div class="card active" id="card-0" onclick="select(0)">
        <span class="card-num">01</span>
        <span class="card-name">Standards</span>
      </div>
      <div class="card" id="card-1" onclick="select(1)">
        <span class="card-num">02</span>
        <span class="card-name">Optimisés</span>
      </div>
      <div class="card" id="card-2" onclick="select(2)">
        <span class="card-num">03</span>
        <span class="card-name">Haute Déf.</span>
      </div>
      <div class="card" id="card-3" onclick="select(3)">
        <span class="card-num">04</span>
        <span class="card-name">Précision HD</span>
      </div>
    </div>

  </div>
</div>

<script>
const lenses = [
  { short: "Standards"    },
  { short: "Optimisés"   },
  { short: "Haute Déf."  },
  { short: "Précision HD"}
];

let current = 0;

function select(i, fromSlider) {
  current = i;
  for (let j = 0; j < 4; j++) {
    document.getElementById('slide-'+j).className = 'slide' + (j===i?' active':'');
    document.getElementById('dot-'+j).className   = 'dot'   + (j===i?' active':'');
    document.getElementById('card-'+j).className  = 'card'  + (j===i?' active':'');
  }
  document.getElementById('sliderValue').textContent = lenses[i].short;
  if (!fromSlider) document.getElementById('slider').value = i;
  document.getElementById('sliderFill').style.width = (i/3*100) + '%';
}

document.getElementById('slider').addEventListener('input', function() {
  select(parseInt(this.value), true);
});

let sx = 0;
const viewer = document.getElementById('viewer');
viewer.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, {passive:true});
viewer.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - sx;
  if (Math.abs(dx) > 40) {
    if (dx < 0 && current < 3) select(current+1);
    if (dx > 0 && current > 0) select(current-1);
  }
}, {passive:true});
viewer.addEventListener('mousedown', e => { sx = e.clientX; });
viewer.addEventListener('mouseup', e => {
  const dx = e.clientX - sx;
  if (Math.abs(dx) > 40) {
    if (dx < 0 && current < 3) select(current+1);
    if (dx > 0 && current > 0) select(current-1);
  }
});

select(0);
</script>
</body>
</html>
