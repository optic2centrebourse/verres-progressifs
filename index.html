<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Verres Progressifs – Optic 2.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #1a4fdb;
    --blue-light: #e8effe;
    --gray: #f5f5f3;
    --text: #111;
    --text-muted: #777;
    --border: #e5e5e5;
    --white: #fff;
    --panel-pad-y: clamp(12px, 1.5vw, 18px);
    --panel-pad-x: clamp(14px, 1.8vw, 22px);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1c1c1e;
    font-family: 'DM Sans', sans-serif;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body {
    min-height: 100dvh;
  }

  .app {
    width: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── IMAGE VIEWER ── */
  .viewer {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #1c1c1e;
    min-height: 0;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.28s ease;
    pointer-events: none;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
  }

  .slide-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: rgba(255,255,255,0.35);
    font-size: clamp(13px, 1.5vw, 16px);
    text-align: center;
    padding: 20px;
  }

  .viewer::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
    z-index: 2;
    pointer-events: none;
  }

  .dots {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.45);
    transition: all 0.2s;
  }
  .dot.active {
    width: 20px;
    border-radius: 3px;
    background: #fff;
  }

  .swipe-hint {
    position: absolute;
    bottom: 13px;
    right: 16px;
    z-index: 3;
    font-size: clamp(11px, 1.2vw, 13px);
    color: rgba(255,255,255,0.4);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── PANNEAU BAS ── */
  .panel {
    flex-shrink: 0;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: row;
    align-items: stretch;
    min-height: clamp(108px, 18vh, 156px);
  }

  /* Logo */
  .brand {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: var(--panel-pad-y) var(--panel-pad-x);
    border-right: 1px solid var(--border);
    gap: 6px;
    min-width: clamp(96px, 10vw, 130px);
  }
  .logo-icon {
    width: clamp(34px, 3.4vw, 42px);
    height: clamp(34px, 3.4vw, 42px);
    border-radius: 50%;
    background: var(--blue-light);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-icon svg {
    width: clamp(19px, 2vw, 23px);
    height: clamp(19px, 2vw, 23px);
  }
  .brand-name {
    font-size: clamp(11px, 1.25vw, 14px);
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--blue);
    text-transform: uppercase;
    text-align: center;
  }

  /* Slider */
  .slider-section {
    flex: 1;
    min-width: 0;
    padding: var(--panel-pad-y) clamp(16px, 2vw, 24px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-right: 1px solid var(--border);
  }
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .slider-label {
    font-size: clamp(13px, 1.45vw, 17px);
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .slider-value {
    font-size: clamp(14px, 1.55vw, 18px);
    font-weight: 600;
    color: var(--blue);
    text-align: right;
    white-space: nowrap;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: clamp(24px, 3vw, 30px);
    height: clamp(24px, 3vw, 30px);
    border-radius: 50%;
    background: var(--blue);
    border: 3px solid white;
    box-shadow: 0 0 0 1.5px var(--blue), 0 2px 5px rgba(26,79,219,0.3);
    cursor: pointer;
    transition: transform 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.12); }
  input[type=range]::-moz-range-thumb {
    width: clamp(24px, 3vw, 30px);
    height: clamp(24px, 3vw, 30px);
    border-radius: 50%;
    background: var(--blue);
    border: 3px solid white;
    box-shadow: 0 0 0 1.5px var(--blue);
    cursor: pointer;
  }

  .slider-track {
    position: relative;
    margin-bottom: 9px;
  }
  .slider-fill {
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    height: 6px;
    background: var(--blue);
    border-radius: 999px;
    pointer-events: none;
    transition: width 0.1s;
  }
  .slider-ticks {
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .tick {
    font-size: clamp(14px, 1.55vw, 20px);
    color: var(--text-muted);
    text-align: center;
    flex: 1;
    line-height: 1.2;
  }
  .tick:first-child { text-align: left; }
  .tick:last-child { text-align: right; }

  /* Cards */
  .cards {
    flex-shrink: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: clamp(8px, 1vw, 12px);
    padding: var(--panel-pad-y) var(--panel-pad-x);
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .cards::-webkit-scrollbar { display: none; }

  .card {
    background: var(--gray);
    border-radius: 12px;
    padding: clamp(10px, 1.3vw, 14px) clamp(14px, 1.7vw, 18px);
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
    min-width: max-content;
  }
  .card.active { background: var(--blue-light); border-color: var(--blue); }
  .card-num {
    font-size: clamp(11px, 1.2vw, 14px);
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    line-height: 1.1;
  }
  .card.active .card-num { color: var(--blue); }
  .card-name {
    font-size: clamp(15px, 1.7vw, 22px);
    font-weight: 600;
    color: var(--text);
    line-height: 1.15;
  }
  .card.active .card-name { color: var(--blue); }

  /* Tablettes portrait / petits écrans */
  @media (max-width: 1100px) {
    .panel {
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "brand slider"
        "cards cards";
      min-height: auto;
    }
    .brand {
      grid-area: brand;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .slider-section {
      grid-area: slider;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .cards {
      grid-area: cards;
      justify-content: flex-start;
      padding-top: 10px;
      padding-bottom: 14px;
    }
  }

  @media (max-width: 768px) {
    .viewer::after { height: 42px; }
    .swipe-hint { right: 12px; bottom: 10px; }
    .panel {
      grid-template-columns: 88px 1fr;
    }
    .slider-header {
      margin-bottom: 10px;
    }
    .tick {
      font-size: clamp(13px, 2.3vw, 18px);
    }
    .card-name {
      font-size: clamp(15px, 2.7vw, 20px);
    }
  }

  /* Tablette 13 pouces Android / paysage */
  @media (min-width: 900px) and (max-width: 1400px) and (orientation: landscape) {
    .tick {
      font-size: clamp(16px, 1.7vw, 21px);
    }
    .card-name {
      font-size: clamp(17px, 1.9vw, 23px);
    }
  }
</style>
</head>
<body>
<div class="app">

  <!-- IMAGE VIEWER -->
  <div class="viewer" id="viewer">

    <div class="slide active" id="slide-0">
      <img src="standards.jpg" alt="Verres standards" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="slide-placeholder" style="display:none">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>standards.jpg</span>
      </div>
    </div>

    <div class="slide" id="slide-1">
      <img src="optimises.jpg" alt="Verres optimisés" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="slide-placeholder" style="display:none">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>optimises.jpg</span>
      </div>
    </div>

    <div class="slide" id="slide-2">
      <img src="haute-def.jpg" alt="Verres Haute Définition" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="slide-placeholder" style="display:none">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>haute-def.jpg</span>
      </div>
    </div>

    <div class="slide" id="slide-3">
      <img src="precision.jpg" alt="Verres Précision HD" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="slide-placeholder" style="display:none">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>precision.jpg</span>
      </div>
    </div>

    <div class="dots">
      <div class="dot active" id="dot-0"></div>
      <div class="dot" id="dot-1"></div>
      <div class="dot" id="dot-2"></div>
      <div class="dot" id="dot-3"></div>
    </div>

    <div class="swipe-hint">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      Glisser
    </div>
  </div>

  <!-- PANNEAU BAS -->
  <div class="panel">

    <div class="brand">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a4fdb" stroke-width="2" stroke-linecap="round">
          <circle cx="7" cy="12" r="4"/><circle cx="17" cy="12" r="4"/>
        </svg>
      </div>
      <span class="brand-name">Optic 2.0</span>
    </div>

    <div class="slider-section">
      <div class="slider-header">
        <span class="slider-label">Niveau de qualité</span>
        <span class="slider-value" id="sliderValue">Standards</span>
      </div>
      <div class="slider-track">
        <div class="slider-fill" id="sliderFill" style="width:0%"></div>
        <input type="range" min="0" max="3" step="1" value="0" id="slider">
      </div>
      <div class="slider-ticks">
        <span class="tick">Standards</span>
        <span class="tick">Optimisés</span>
        <span class="tick">Haute Déf.</span>
        <span class="tick">Précision HD</span>
      </div>
    </div>

    <div class="cards">
      <div class="card active" id="card-0" onclick="select(0)">
        <span class="card-num">01</span>
        <span class="card-name">Standards</span>
      </div>
      <div class="card" id="card-1" onclick="select(1)">
        <span class="card-num">02</span>
        <span class="card-name">Optimisés</span>
      </div>
      <div class="card" id="card-2" onclick="select(2)">
        <span class="card-num">03</span>
        <span class="card-name">Haute Déf.</span>
      </div>
      <div class="card" id="card-3" onclick="select(3)">
        <span class="card-num">04</span>
        <span class="card-name">Précision HD</span>
      </div>
    </div>

  </div>
</div>

<script>
const lenses = [
  { short: "Standards"    },
  { short: "Optimisés"   },
  { short: "Haute Déf."  },
  { short: "Précision HD"}
];

let current = 0;

function select(i, fromSlider) {
  current = i;
  for (let j = 0; j < 4; j++) {
    document.getElementById('slide-'+j).className = 'slide' + (j===i?' active':'');
    document.getElementById('dot-'+j).className   = 'dot'   + (j===i?' active':'');
    document.getElementById('card-'+j).className  = 'card'  + (j===i?' active':'');
  }
  document.getElementById('sliderValue').textContent = lenses[i].short;
  if (!fromSlider) document.getElementById('slider').value = i;
  document.getElementById('sliderFill').style.width = (i/3*100) + '%';
}

document.getElementById('slider').addEventListener('input', function() {
  select(parseInt(this.value), true);
});

let sx = 0;
const viewer = document.getElementById('viewer');
viewer.addEventListener('touchstart', e => { sx = e.touches[0].clientX; }, {passive:true});
viewer.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - sx;
  if (Math.abs(dx) > 40) {
    if (dx < 0 && current < 3) select(current+1);
    if (dx > 0 && current > 0) select(current-1);
  }
}, {passive:true});
viewer.addEventListener('mousedown', e => { sx = e.clientX; });
viewer.addEventListener('mouseup', e => {
  const dx = e.clientX - sx;
  if (Math.abs(dx) > 40) {
    if (dx < 0 && current < 3) select(current+1);
    if (dx > 0 && current > 0) select(current-1);
  }
});

select(0);
</script>
</body>
</html>
